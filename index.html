<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnX - Admin Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-darker: #020617;
            --card-bg: #1e293b;
            --card-border: #334155;
            --primary: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-darker); color: var(--text-light); }
        
        /* LOGIN SCREEN */
        #login-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--bg-dark); }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 20px; border: 1px solid var(--card-border); text-align: center; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-box input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; background: var(--bg-darker); border: 1px solid var(--card-border); color: white; outline: none; }
        .login-box input:focus { border-color: var(--primary); }
        
        .btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; }
        .btn:hover { background: #059669; }
        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: #dc2626; }
        .btn-small { padding: 8px 12px; font-size: 0.85rem; width: auto; }

        /* DASHBOARD */
        #admin-dashboard { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--card-border); margin-bottom: 30px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card-bg); padding: 25px; border-radius: 16px; border: 1px solid var(--card-border); border-left: 5px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .stat-card h3 { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 10px; text-transform: uppercase; }
        .stat-card .value { font-size: 2.5rem; font-weight: bold; }
        
        /* TABS */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--card-border); padding-bottom: 10px; }
        .tab { padding: 10px 20px; cursor: pointer; border-radius: 8px; font-weight: 600; color: var(--text-muted); transition: 0.2s; }
        .tab.active { background: rgba(16, 185, 129, 0.1); color: var(--primary); border: 1px solid var(--primary); }

        /* TABLE */
        .table-container { background: var(--card-bg); border-radius: 16px; border: 1px solid var(--card-border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 15px 20px; border-bottom: 1px solid var(--card-border); }
        th { background: rgba(0,0,0,0.2); color: var(--text-muted); font-weight: 600; font-size: 0.9rem; text-transform: uppercase; }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .badge-pending { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .badge-approved { background: rgba(16, 185, 129, 0.2); color: var(--primary); }
        .badge-rejected { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

        .action-btns { display: flex; gap: 10px; }

        #toast { position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white; padding: 15px 25px; border-radius: 8px; font-weight: bold; display: none; z-index: 9999; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        /* Loader */
        .loader { border: 4px solid var(--card-border); border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="toast">Message</div>

    <div id="login-screen">
        <div class="login-box">
            <i class="fa-solid fa-user-shield" style="font-size: 4rem; color: var(--primary); margin-bottom: 20px;"></i>
            <h2>Admin Panel</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px;">EarnX Secure Access</p>
            <input type="email" id="admin-email" placeholder="Admin Email ID">
            <input type="password" id="admin-password" placeholder="Password">
            <button class="btn" onclick="adminLogin()" style="margin-top: 15px;">Secure Login</button>
        </div>
    </div>

    <div id="admin-dashboard">
        <div class="header">
            <div>
                <h1 style="color: var(--primary);"><i class="fa-solid fa-rocket"></i> EarnX Admin</h1>
                <p style="font-size: 0.9rem;">Manage Withdrawals & Users</p>
            </div>
            <button class="btn btn-danger btn-small" onclick="adminLogout()"><i class="fa-solid fa-power-off"></i> Logout</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card" style="border-left-color: var(--warning);">
                <h3>Pending Requests</h3>
                <div class="value" id="stat-pending">0</div>
            </div>
            <div class="stat-card" style="border-left-color: var(--primary);">
                <h3>Total Paid (₹)</h3>
                <div class="value" id="stat-paid">₹0</div>
            </div>
            <div class="stat-card" style="border-left-color: #3b82f6;">
                <h3>Total Users</h3>
                <div class="value" id="stat-users">0</div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('pending')" id="tab-pending">Pending Requests</div>
            <div class="tab" onclick="switchTab('history')" id="tab-history">History Log</div>
        </div>

        <div class="table-container">
            <div class="loader" id="table-loader"></div>
            <table id="data-table">
                <thead>
                    <tr>
                        <th>Date & Time</th>
                        <th>User ID</th>
                        <th>UPI ID</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th id="th-action">Action</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, updateDoc, doc, getDoc, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    // Aapka apna EarnX Database Config
    const firebaseConfig = {
      apiKey: "AIzaSyCpS_rr77wh23C2LYl6xCSTyptMKlITauk",
      authDomain: "dukaan-platform.firebaseapp.com",
      projectId: "dukaan-platform",
      storageBucket: "dukaan-platform.firebasestorage.app",
      messagingSenderId: "75765851780",
      appId: "1:75765851780:web:b6782abb897594b89c84d1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    window.db = db;

    let currentTab = 'pending';
    let allWithdrawals = [];

    // --- UTILS ---
    window.showToast = (msg, isError = false) => {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.background = isError ? "var(--danger)" : "var(--primary)";
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 3000);
    }

    // --- AUTHENTICATION ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-dashboard').style.display = 'block';
            loadDashboardData();
        } else {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('admin-dashboard').style.display = 'none';
        }
    });

    window.adminLogin = async () => {
        const email = document.getElementById('admin-email').value.trim();
        const pwd = document.getElementById('admin-password').value.trim();
        if(!email || !pwd) return window.showToast("Enter Details", true);
        try {
            await signInWithEmailAndPassword(auth, email, pwd);
            window.showToast("Welcome Admin!");
        } catch(e) {
            window.showToast("Invalid Credentials", true);
        }
    }

    window.adminLogout = () => { signOut(auth); }

    // --- DASHBOARD LOGIC ---
    async function loadDashboardData() {
        document.getElementById('table-loader').style.display = 'block';
        document.getElementById('table-body').innerHTML = '';
        allWithdrawals = [];

        try {
            // Fetch Users Count
            const userSnap = await getDocs(collection(db, "earnx_users"));
            document.getElementById('stat-users').innerText = userSnap.size;

            // Fetch All Withdrawals
            const wSnap = await getDocs(collection(db, "earnx_withdrawals"));
            let pendingCount = 0;
            let totalPaidCoins = 0;

            wSnap.forEach(doc => {
                const data = doc.data();
                data.docId = doc.id;
                allWithdrawals.push(data);
                
                if(data.status === "Pending") pendingCount++;
                if(data.status === "Approved") totalPaidCoins += data.coins;
            });

            // Sort newest first
            allWithdrawals.sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

            document.getElementById('stat-pending').innerText = pendingCount;
            document.getElementById('stat-paid').innerText = `₹${totalPaidCoins / 10000 * 100}`;
            
            renderTable();
        } catch (e) {
            console.error(e);
            window.showToast("Error loading data", true);
        } finally {
            document.getElementById('table-loader').style.display = 'none';
        }
    }

    window.switchTab = (tab) => {
        currentTab = tab;
        document.getElementById('tab-pending').classList.remove('active');
        document.getElementById('tab-history').classList.remove('active');
        document.getElementById(`tab-${tab}`).classList.add('active');
        
        document.getElementById('th-action').style.display = (tab === 'pending') ? 'table-cell' : 'none';
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        
        const filtered = allWithdrawals.filter(w => {
            if(currentTab === 'pending') return w.status === 'Pending';
            return w.status !== 'Pending';
        });

        if(filtered.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color: var(--text-muted);">No records found.</td></tr>`;
            return;
        }

        filtered.forEach(w => {
            const dateStr = w.createdAt ? new Date(w.createdAt.seconds * 1000).toLocaleString() : 'Unknown';
            const amountInRs = (w.coins / 10000) * 100;
            
            let badgeClass = 'badge-pending';
            if(w.status === 'Approved') badgeClass = 'badge-approved';
            if(w.status === 'Rejected') badgeClass = 'badge-rejected';

            const tr = document.createElement('tr');
            let html = `
                <td style="font-size: 0.8rem; color: var(--text-muted);">${dateStr}</td>
                <td style="font-size: 0.8rem;">${w.userId.substring(0,8)}...</td>
                <td style="font-weight: bold; color: white;">${w.upiId}</td>
                <td style="color: var(--primary); font-weight: bold;">₹${amountInRs} <br><span style="font-size:0.7rem; color:gray;">(${w.coins} Coins)</span></td>
                <td><span class="badge ${badgeClass}">${w.status}</span></td>
            `;

            if(currentTab === 'pending') {
                html += `
                <td>
                    <div class="action-btns">
                        <button class="btn btn-small" onclick="approveReq('${w.docId}')"><i class="fa-solid fa-check"></i> Approve</button>
                        <button class="btn btn-danger btn-small" onclick="rejectReq('${w.docId}', '${w.userId}', ${w.coins})"><i class="fa-solid fa-times"></i> Reject</button>
                    </div>
                </td>`;
            } else {
                html += `<td style="display:none;"></td>`;
            }

            tr.innerHTML = html;
            tbody.appendChild(tr);
        });
    }

    // --- ACTION LOGIC (SURGICAL STRIKE) ---
    
    window.approveReq = async (docId) => {
        if(!confirm("Are you sure you want to APPROVE this payment?")) return;
        try {
            await updateDoc(doc(db, "earnx_withdrawals", docId), { status: "Approved" });
            window.showToast("Payment Approved!");
            loadDashboardData(); // Refresh
        } catch(e) { window.showToast("Error approving", true); }
    }

    // AUTO REFUND LOGIC ON REJECT
    window.rejectReq = async (docId, userId, coinAmount) => {
        const reason = prompt("Enter reason for rejection (e.g. Invalid UPI, Cheating):");
        if(reason === null) return; // Admin cancelled
        
        try {
            // 1. Mark Withdrawal as Rejected
            await updateDoc(doc(db, "earnx_withdrawals", docId), { 
                status: "Rejected", 
                reason: reason || "Admin Rejected" 
            });

            // 2. Fetch User & Refund Coins
            const userRef = doc(db, "earnx_users", userId);
            const userSnap = await getDoc(userRef);
            
            if(userSnap.exists()) {
                const userData = userSnap.data();
                const newBalance = (Number(userData.coins) || 0) + coinAmount;
                
                // Add transaction history for user so they know they got a refund
                let txs = userData.transactions || [];
                txs.unshift({
                    title: "Refund: " + (reason || "Withdrawal Rejected"),
                    amount: coinAmount,
                    type: "earn",
                    date: Date.now()
                });
                if(txs.length > 50) txs.pop();

                await updateDoc(userRef, { 
                    coins: newBalance,
                    transactions: txs
                });
            }

            window.showToast("Rejected & Coins Refunded to User!");
            loadDashboardData(); // Refresh

        } catch(e) { 
            console.error(e);
            window.showToast("Error processing reject", true); 
        }
    }
</script>
</body>
</html>
